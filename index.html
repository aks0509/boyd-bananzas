<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boyd Bananzas | Game Hub</title>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #1e1e2e;
            --card-bg: #2f3542;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1000px;
            width: 90%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: inherit;
            border: 2px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--primary);
        }

        .game-thumb {
            width: 100%;
            height: 150px;
            background: #454d5d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-info h2 {
            margin: 0;
            font-size: 1.4rem;
        }

        .game-info p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 8px;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>Boyd Bananzas</h1>
        <p>Choose your game and start playing!</p>
    </header>

    <main class="container">
        
        <a href="https://aks0509.github.io/game-one-repo/" class="game-card">
            <div class="game-thumb">🎮</div>
            <div class="game-info">
                <h2>Space Shooter</h2>
                <p>Blast through asteroids in this arcade classic.</p>
            </div>
        </a>

        <a href="https://aks0509.github.io/game-two-repo/" class="game-card">
            <div class="game-thumb">🐍</div>
            <div class="game-info">
                <h2>Neon Snake</h2>
                <p>A high-speed twist on a retro favorite.</p>
            </div>
        </a>

        </main>

    <footer>
        &copy; 2026 Boyd Bananzas - Hosted via GitHub Pages
    </footer>

</body>
</html>
